models:
  - name: "deepseek-v3"
    api_type: "openai_compatible"
    base_url: "https://api.deepseek.com/v1"
    model_id: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"

experiment:
  runs_per_condition: 30
  temperature: 0.7
  max_turns: 5
  mock_server_port: 8000

output:
  result_dir: "results/"
  egress_log: "results/egress_log.jsonl"
  raw_csv: "results/raw_results.csv"
  summary_md: "results/summary.md"
